<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AutoAds - Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%); min-height: 100vh; display: flex; align-items: center; }
  </style>
</head>
<body>
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <div class="card bg-dark text-light border-warning">
          <div class="card-body p-5 text-center">
            <h1 class="display-5 mb-1 text-warning"><i class="bi bi-graph-up-arrow"></i></h1>
            <h3 class="mb-1">AutoAds</h3>
            <p class="text-muted mb-4">Automação de Tráfego Pago</p>
            {% with msgs = get_flashed_messages(with_categories=true) %}
              {% for cat, msg in msgs %}
                <div class="alert alert-danger">{{ msg }}</div>
              {% endfor %}
            {% endwith %}
            <form method="POST">
              <div class="mb-3">
                <input type="password" name="senha" class="form-control form-control-lg bg-dark text-light" placeholder="Senha" required>
              </div>
              <button class="btn btn-warning btn-lg w-100 text-dark fw-bold">Entrar</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
